name: Backup Semanal do Banco de Dados

on:
  schedule:
    # Executa toda segunda-feira às 2h UTC (23h de domingo no horário de Brasília)
    - cron: '0 2 * * 1'
  workflow_dispatch: # Permite execução manual

jobs:
  backup:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    
    steps:
      - name: Checkout código
        uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      
      - name: Instalar dependências
        run: npm ci
      
      - name: Instalar PostgreSQL client
        run: |
          sudo apt-get update
          sudo apt-get install -y postgresql-client

      - name: Verificar Docker no runner
        run: |
          docker --version
          docker info
      
      - name: Executar backup
        env:
          DIRECT_URL: ${{ secrets.DIRECT_URL }}
        run: |
          echo "🔍 Verificando variáveis de ambiente..."
          if [ -z "$DIRECT_URL" ]; then
            echo "❌ Erro: DIRECT_URL não configurada"
            exit 1
          fi
          echo "✅ DIRECT_URL configurada"
          npx tsx scripts/backup-database-weekly.ts
      
      - name: Verificar se backup foi criado
        run: |
          if [ ! -d "backups" ] || [ -z "$(ls -A backups)" ]; then
            echo "❌ Erro: Nenhum arquivo de backup encontrado no diretório backups/"
            ls -la backups/ || echo "Diretório backups/ não existe"
            exit 1
          fi
          echo "✅ Arquivos de backup encontrados:"
          ls -lh backups/
      
      - name: Upload backup para artifacts
        uses: actions/upload-artifact@v4
        with:
          name: database-backup
          path: backups/
          retention-days: 30
          if-no-files-found: error
      
      # Opcional: Upload para S3/Cloud Storage
